name: Build and Publish Docker Image

on:
  schedule:
    - cron: '23 14 * * *'
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      url: ${{ steps.version.outputs.url }}
      repo: ${{ steps.version.outputs.repo }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - name: Get latest UnrealIRCd version
        id: version
        run: |
          DATA=$(curl -fsSL https://www.unrealircd.org/downloads/list.json)
          VERSION=$(echo "$DATA" | jq -r '.[keys[0]].Stable.version')
          URL=$(echo "$DATA" | jq -r '.[keys[0]].Stable.downloads.src')
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "ghcr.io/$REPO:$VERSION" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    if: needs.version.outputs.skip == 'false'
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          build-args: UNREALIRCD_URL=${{ needs.version.outputs.url }}
          outputs: type=image,name=ghcr.io/${{ needs.version.outputs.repo }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/

  merge:
    needs: [version, build]
    if: needs.version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          AMD64=$(cat /tmp/digests/amd64)
          ARM64=$(cat /tmp/digests/arm64)
          IMAGE=ghcr.io/${{ needs.version.outputs.repo }}
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ needs.version.outputs.version }}" \
            "$IMAGE@$AMD64" \
            "$IMAGE@$ARM64"
