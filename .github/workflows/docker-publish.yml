name: Build and Publish Docker Image

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest UnrealIRCd version
        id: version
        run: |
          DATA=$(curl -fsSL https://www.unrealircd.org/downloads/list.json)
          VERSION=$(echo "$DATA" | jq -r '.[keys[0]].Stable.version')
          URL=$(echo "$DATA" | jq -r '.[keys[0]].Stable.downloads.src')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: UNREALIRCD_URL=${{ steps.version.outputs.url }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
